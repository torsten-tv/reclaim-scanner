name: daily-scan

on:
  schedule:
    - cron: "0 22 * * 1-5"   # werktags 22:00 UTC (nach US-Schluss)
  workflow_dispatch:           # manuell ausloesbar

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install yfinance pandas numpy lxml requests
      - name: Scan
        run: python scanner.py
      - name: Build dashboard
        run: python build_dashboard.py
      - name: Prepare site
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
